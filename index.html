<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to Word — OCR & Export</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:24px;font-weight:700;color:#1a1a2e}

/* Drop zone */
.dropzone{border:2px dashed #94a3b8;border-radius:12px;padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;margin-bottom:20px}
.dropzone:hover,.dropzone.dragover{border-color:#3b82f6;background:#eff6ff}
.dropzone p{color:#64748b;font-size:.95rem;margin-top:8px}
.dropzone .icon{font-size:2.4rem;color:#94a3b8}
.dropzone input{display:none}

/* Progress */
.progress-wrap{display:none;margin-bottom:20px}
.progress-bar{height:22px;background:#e2e8f0;border-radius:11px;overflow:hidden;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);border-radius:11px;transition:width .3s;width:0}
.progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;color:#1e293b}

/* Error */
.error-msg{display:none;background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:.9rem}

/* Main grid */
.main-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:20px}
@media(max-width:768px){.main-grid{grid-template-columns:1fr}}

/* Textarea */
.text-section{display:none;flex-direction:column}
.text-section label{font-weight:600;margin-bottom:6px;font-size:.9rem}
.text-section textarea{width:100%;min-height:260px;padding:12px;border:1px solid #cbd5e1;border-radius:8px;font-size:.95rem;resize:vertical;font-family:inherit;line-height:1.6}
.text-section textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}

/* Settings panel */
.settings{display:none;background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e8f0;flex-direction:column;gap:14px}
.settings h3{font-size:1rem;margin-bottom:2px;color:#334155}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.8rem;font-weight:600;color:#475569}
.field select,.field input[type="number"],.field input[type="color"]{width:100%;padding:6px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:.85rem;background:#fff}
.field input[type="color"]{height:34px;padding:2px 4px;cursor:pointer}
.toggles{display:flex;gap:6px}
.toggles button{flex:1;padding:6px 0;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.toggles button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.align-btns{display:flex;gap:6px}
.align-btns button{flex:1;padding:6px 0;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer;font-size:.8rem;transition:all .15s}
.align-btns button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}

/* Preview */
.preview-section{display:none;flex-direction:column}
.preview-section h3{font-size:.95rem;font-weight:600;margin-bottom:6px;color:#334155}
.preview-box{border:1px solid #cbd5e1;border-radius:8px;padding:20px;min-height:160px;background:#fff;white-space:pre-wrap;word-wrap:break-word;overflow-y:auto;max-height:300px}

/* Export */
.export-wrap{display:none;text-align:center;margin-top:4px}
.btn-export{padding:12px 36px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .1s}
.btn-export:hover{transform:scale(1.03)}
.btn-export:active{transform:scale(.98)}
</style>
</head>
<body>
<div class="container">
  <h1>Image to Word</h1>

  <div class="dropzone" id="dropzone">
    <div class="icon">&#128444;</div>
    <p><strong>Drop an image here</strong> or click to browse</p>
    <p style="font-size:.8rem;color:#94a3b8">PNG, JPG, JPEG, WebP, BMP</p>
    <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.webp,.bmp">
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div><div class="progress-text" id="progressText">0%</div></div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="main-grid">
    <div>
      <div class="text-section" id="textSection">
        <label for="ocrText">Extracted Text (editable)</label>
        <textarea id="ocrText" spellcheck="true"></textarea>
      </div>
      <div class="preview-section" id="previewSection">
        <h3>Live Preview</h3>
        <div class="preview-box" id="previewBox"></div>
      </div>
    </div>

    <div class="settings" id="settingsPanel">
      <h3>Text Settings</h3>
      <div class="field">
        <label>Font Family</label>
        <select id="sFont">
          <option value="Calibri" selected>Calibri</option>
          <option value="Arial">Arial</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Georgia">Georgia</option>
          <option value="Verdana">Verdana</option>
        </select>
      </div>
      <div class="field">
        <label>Font Size (pt)</label>
        <input type="number" id="sSize" value="11" min="6" max="72" step="0.5">
      </div>
      <div class="field">
        <label>Style</label>
        <div class="toggles">
          <button id="sBold" onclick="toggle(this)"><b>B</b></button>
          <button id="sItalic" onclick="toggle(this)"><i>I</i></button>
          <button id="sUnder" onclick="toggle(this)"><u>U</u></button>
        </div>
      </div>
      <div class="field">
        <label>Alignment</label>
        <div class="align-btns">
          <button class="active" data-align="LEFT" onclick="setAlign(this)">Left</button>
          <button data-align="CENTER" onclick="setAlign(this)">Center</button>
          <button data-align="RIGHT" onclick="setAlign(this)">Right</button>
          <button data-align="JUSTIFIED" onclick="setAlign(this)">Justify</button>
        </div>
      </div>
      <div class="field">
        <label>Line Spacing</label>
        <select id="sSpacing">
          <option value="1">Single</option>
          <option value="1.5" selected>1.5</option>
          <option value="2">Double</option>
        </select>
      </div>
      <div class="field">
        <label>Text Color</label>
        <input type="color" id="sColor" value="#000000">
      </div>
      <div class="field">
        <label>Paragraph Spacing After (pt)</label>
        <input type="number" id="sParaAfter" value="8" min="0" max="72" step="1">
      </div>
      <div class="field">
        <label>OCR Language</label>
        <select id="sLang">
          <option value="eng" selected>English</option>
          <option value="fra">French</option>
          <option value="deu">German</option>
          <option value="spa">Spanish</option>
          <option value="ita">Italian</option>
          <option value="por">Portuguese</option>
          <option value="rus">Russian</option>
          <option value="chi_sim">Chinese (Simplified)</option>
          <option value="jpn">Japanese</option>
          <option value="kor">Korean</option>
          <option value="ara">Arabic</option>
        </select>
      </div>
    </div>
  </div>

  <div class="export-wrap" id="exportWrap">
    <button class="btn-export" onclick="exportDocx()">Download .docx</button>
  </div>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const errorMsg = document.getElementById('errorMsg');
const textSection = document.getElementById('textSection');
const ocrText = document.getElementById('ocrText');
const settingsPanel = document.getElementById('settingsPanel');
const previewSection = document.getElementById('previewSection');
const previewBox = document.getElementById('previewBox');
const exportWrap = document.getElementById('exportWrap');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

const VALID = ['image/png','image/jpeg','image/webp','image/bmp'];

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
}
function hideError() { errorMsg.style.display = 'none'; }

async function handleFile(file) {
  hideError();
  if (!VALID.includes(file.type)) { showError('Unsupported format. Please use PNG, JPG, JPEG, WebP, or BMP.'); return; }

  progressWrap.style.display = 'block';
  progressFill.style.width = '0%';
  progressText.textContent = 'Initializing OCR…';
  textSection.style.display = 'none';
  settingsPanel.style.display = 'none';
  previewSection.style.display = 'none';
  exportWrap.style.display = 'none';

  const lang = document.getElementById('sLang').value;

  try {
    const { data } = await Tesseract.recognize(file, lang, {
      logger: m => {
        if (m.status === 'recognizing text' && typeof m.progress === 'number') {
          const pct = Math.round(m.progress * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = pct + '%';
        } else if (m.status) {
          progressText.textContent = m.status;
        }
      }
    });

    progressWrap.style.display = 'none';
    const text = (data.text || '').trim();
    if (!text) { showError('OCR completed but no text was detected. Try a clearer image or different language.'); return; }

    ocrText.value = text;
    textSection.style.display = 'flex';
    settingsPanel.style.display = 'flex';
    previewSection.style.display = 'flex';
    exportWrap.style.display = 'block';
    updatePreview();
  } catch (err) {
    progressWrap.style.display = 'none';
    showError('OCR failed: ' + (err.message || err));
  }
}

function toggle(btn) { btn.classList.toggle('active'); updatePreview(); }

function setAlign(btn) {
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updatePreview();
}

function getSettings() {
  const activeAlign = document.querySelector('.align-btns button.active');
  return {
    font: document.getElementById('sFont').value,
    size: parseFloat(document.getElementById('sSize').value) || 11,
    bold: document.getElementById('sBold').classList.contains('active'),
    italic: document.getElementById('sItalic').classList.contains('active'),
    underline: document.getElementById('sUnder').classList.contains('active'),
    align: activeAlign ? activeAlign.dataset.align : 'LEFT',
    spacing: parseFloat(document.getElementById('sSpacing').value) || 1.5,
    color: document.getElementById('sColor').value,
    paraAfter: parseInt(document.getElementById('sParaAfter').value) || 0,
  };
}

function updatePreview() {
  const s = getSettings();
  const cssAlign = { LEFT:'left', CENTER:'center', RIGHT:'right', JUSTIFIED:'justify' }[s.align] || 'left';
  previewBox.style.fontFamily = s.font;
  previewBox.style.fontSize = s.size + 'pt';
  previewBox.style.fontWeight = s.bold ? 'bold' : 'normal';
  previewBox.style.fontStyle = s.italic ? 'italic' : 'normal';
  previewBox.style.textDecoration = s.underline ? 'underline' : 'none';
  previewBox.style.textAlign = cssAlign;
  previewBox.style.lineHeight = s.spacing;
  previewBox.style.color = s.color;
  previewBox.textContent = ocrText.value;
}

document.querySelectorAll('#settingsPanel select, #settingsPanel input').forEach(el => {
  el.addEventListener('input', updatePreview);
  el.addEventListener('change', updatePreview);
});
ocrText.addEventListener('input', updatePreview);

function hexToRGB(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function exportDocx() {
  const s = getSettings();
  const text = ocrText.value;
  if (!text.trim()) return;

  const { Document, Packer, Paragraph, TextRun, AlignmentType, convertInchesToTwip } = docx;

  const alignMap = { LEFT: AlignmentType.LEFT, CENTER: AlignmentType.CENTER, RIGHT: AlignmentType.RIGHT, JUSTIFIED: AlignmentType.JUSTIFIED };
  const spacingLine = Math.round(s.spacing * 240);
  const rgb = hexToRGB(s.color);
  const colorHex = s.color.replace('#','');

  const paragraphs = text.split('\n').map(line => {
    return new Paragraph({
      alignment: alignMap[s.align] || AlignmentType.LEFT,
      spacing: { after: s.paraAfter * 20, line: spacingLine },
      children: [
        new TextRun({
          text: line,
          font: s.font,
          size: s.size * 2,
          bold: s.bold,
          italics: s.italic,
          underline: s.underline ? { type: 'single' } : undefined,
          color: colorHex,
        })
      ]
    });
  });

  const doc = new Document({
    sections: [{ children: paragraphs }]
  });

  Packer.toBlob(doc).then(blob => {
    saveAs(blob, 'extracted-text.docx');
  });
}
</script>
</body>
</html>
