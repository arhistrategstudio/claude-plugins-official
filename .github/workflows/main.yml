name: Claude Code Review

on:
  pull_request:
      types: [opened, synchronize, reopened]

      jobs:
        claude:
            runs-on: ubuntu-latest
                permissions:
                      pull-requests: write
                            contents: read
                                steps:
                                      - uses: actions/checkout@v4
                                            - uses: anthropics/claude-code-action-official@v0.0.31
                                                    with:
                                                              github_token: ${{ secrets.GITHUB_TOKEN }}
